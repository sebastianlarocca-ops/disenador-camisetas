<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMA — Custom Kit Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-0:#08080b; --bg-1:#0d0d12; --bg-2:#14141b; --bg-3:#1c1c25;
    --bg-glass:rgba(20,20,27,.55); --bg-glass-strong:rgba(20,20,27,.78);
    --hair:rgba(255,255,255,.06); --hair-strong:rgba(255,255,255,.11); --hair-bright:rgba(255,255,255,.18);
    --ink-0:#f4f4f0; --ink-1:rgba(244,244,240,.62); --ink-2:rgba(244,244,240,.42); --ink-3:rgba(244,244,240,.24);
    --accent:oklch(0.82 0.2 138); --accent-deep:oklch(0.62 0.18 138);
    --accent-glow:oklch(0.82 0.2 138/.22); --accent-glow-strong:oklch(0.82 0.2 138/.45);
    --accent-ink:#0a0e07;
    --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-pill:999px;
    --f-ui:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
    --f-mono:'JetBrains Mono',ui-monospace,monospace;
    --f-display:'Bebas Neue',sans-serif;
    --blur-1:10px; --blur-2:20px; --blur-3:32px;
    --sh-1:0 1px 0 rgba(255,255,255,.04) inset,0 1px 2px rgba(0,0,0,.4);
    --sh-2:0 1px 0 rgba(255,255,255,.05) inset,0 8px 20px -8px rgba(0,0,0,.55),0 2px 6px rgba(0,0,0,.35);
    --sh-glass:0 1px 0 rgba(255,255,255,.07) inset,0 0 0 1px rgba(255,255,255,.04),0 22px 50px -20px rgba(0,0,0,.75),0 4px 12px rgba(0,0,0,.4);
    --ease-out:cubic-bezier(.22,1,.36,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);
    --t-fast:140ms; --t-med:280ms; --t-slow:520ms;
    --cx:50%; --cy:45%;
  }
  html,body { height:100%; }
  body {
    font-family:var(--f-ui); background:var(--bg-0); color:var(--ink-0);
    overflow:hidden; font-feature-settings:'ss01','cv11';
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .mono { font-family:var(--f-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-2); }
  .num  { font-family:var(--f-mono); letter-spacing:-.01em; font-variant-numeric:tabular-nums; }
  button { font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  input,textarea { font-family:inherit; color:inherit; }
  input:focus,button:focus,textarea:focus { outline:none; }

  /* ── APP SHELL ── */
  .app {
    height:100vh; display:grid;
    grid-template-rows:56px 1fr;
    grid-template-columns:var(--sidebar-w,340px) 1fr;
    grid-template-areas:"topbar topbar" "side stage";
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,255,255,.025),transparent 60%),var(--bg-0);
  }
  .app[data-sidebar-collapsed="true"] { --sidebar-w:64px; }

  /* ── TOP BAR ── */
  .topbar {
    grid-area:topbar; display:flex; align-items:center; padding:0 16px 0 18px;
    border-bottom:1px solid var(--hair); background:rgba(8,8,11,.7);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    gap:14px; position:relative; z-index:30; min-width:0; overflow:hidden;
  }
  .brand { display:flex; align-items:center; gap:10px; padding-right:14px; border-right:1px solid var(--hair); height:100%; white-space:nowrap; flex-shrink:0; }
  .brand-mark {
    width:26px; height:26px; border-radius:7px;
    background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.18),transparent 60%),linear-gradient(135deg,var(--accent),var(--accent-deep));
    box-shadow:0 0 0 1px var(--hair-bright),0 4px 14px var(--accent-glow);
    display:grid; place-items:center; color:var(--accent-ink);
    font-family:var(--f-display); font-size:16px; letter-spacing:.04em;
  }
  .brand-name { font-family:var(--f-display); font-size:19px; letter-spacing:.1em; white-space:nowrap; }
  .brand-tag {
    font-family:var(--f-mono); font-size:9.5px; color:var(--ink-2); letter-spacing:.1em;
    text-transform:uppercase; padding:2px 7px; border:1px solid var(--hair-strong);
    border-radius:var(--r-pill); white-space:nowrap;
  }
  .project-meta { display:flex; align-items:center; gap:10px; color:var(--ink-1); font-size:13px; min-width:0; flex-shrink:1; overflow:hidden; }
  .project-name {
    color:var(--ink-0); font-weight:500; padding:4px 8px; border-radius:6px;
    border:1px solid transparent; background:transparent; width:220px; font-size:13px;
  }
  .project-name:hover { background:var(--bg-2); }
  .project-name:focus { border-color:var(--accent); background:var(--bg-2); }
  .project-sep { color:var(--ink-3); }
  .project-status {
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--f-mono); font-size:10.5px; letter-spacing:.08em;
    color:var(--ink-2); text-transform:uppercase; white-space:nowrap;
  }
  .project-status::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
  .top-spacer { flex:1; }
  .top-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .ico-btn {
    width:32px; height:32px; display:grid; place-items:center;
    border-radius:8px; color:var(--ink-1); border:1px solid transparent; transition:all .15s ease;
  }
  .ico-btn:hover { background:var(--bg-2); color:var(--ink-0); border-color:var(--hair); }
  .ico-btn:disabled { opacity:.35; cursor:not-allowed; }
  .ico-btn svg { width:16px; height:16px; stroke-width:1.7; }
  .top-divider { width:1px; height:20px; background:var(--hair); margin:0 4px; }
  .btn-ghost {
    height:32px; padding:0 12px; border-radius:8px; color:var(--ink-1);
    font-size:12.5px; font-weight:500; border:1px solid var(--hair-strong);
    background:var(--bg-2); display:inline-flex; align-items:center; gap:7px; transition:all .15s ease;
  }
  .btn-ghost:hover { background:var(--bg-3); color:var(--ink-0); border-color:var(--hair-bright); }
  .btn-ghost svg { width:14px; height:14px; stroke-width:1.7; }
  .btn-primary {
    height:32px; padding:0 14px; border-radius:8px; color:var(--accent-ink);
    font-size:12.5px; font-weight:600;
    background:linear-gradient(180deg,var(--accent),var(--accent-deep));
    box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 0 0 1px rgba(0,0,0,.18) inset,0 6px 18px var(--accent-glow);
    display:inline-flex; align-items:center; gap:7px;
    transition:transform var(--t-med) var(--ease-spring),box-shadow var(--t-med) var(--ease-out);
    position:relative; overflow:hidden;
  }
  .btn-primary::before { content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.25),transparent 40%); pointer-events:none; }
  .btn-primary:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 0 0 1px rgba(0,0,0,.18) inset,0 14px 32px var(--accent-glow-strong); }
  .btn-primary:active { transform:translateY(-1px) scale(1); }
  .btn-primary svg { width:14px; height:14px; stroke-width:2; }
  .avatar {
    width:30px; height:30px; border-radius:50%;
    background:linear-gradient(135deg,oklch(0.7 0.15 30),oklch(0.5 0.18 320));
    border:1px solid var(--hair-bright); color:var(--ink-0);
    display:grid; place-items:center; font-size:11px; font-weight:600; letter-spacing:.02em;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-area:side; border-right:1px solid var(--hair);
    background:radial-gradient(ellipse 100% 70% at 0% 0%,rgba(255,255,255,.025),transparent 50%),linear-gradient(180deg,var(--bg-1),var(--bg-0));
    overflow-y:auto; overflow-x:hidden; position:relative;
    transition:width .25s var(--ease-out); z-index:10;
  }
  .sidebar::-webkit-scrollbar { width:8px; }
  .sidebar::-webkit-scrollbar-track { background:transparent; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--hair-strong); border-radius:4px; }
  .sidebar-collapse {
    position:absolute; top:14px; right:10px; width:26px; height:26px;
    border-radius:6px; display:grid; place-items:center; color:var(--ink-2);
    border:1px solid var(--hair); background:var(--bg-2); z-index:3; transition:all .15s ease;
  }
  .sidebar-collapse:hover { color:var(--ink-0); border-color:var(--hair-bright); }
  .sidebar-collapse svg { width:13px; height:13px; }
  .app[data-sidebar-collapsed="true"] .sidebar-content { opacity:0; pointer-events:none; }
  .app[data-sidebar-collapsed="true"] .sidebar-rail { opacity:1; pointer-events:auto; }
  .sidebar-content {
    padding:22px 18px 80px; display:flex; flex-direction:column; gap:8px;
    transition:opacity .15s ease;
  }
  .sidebar-rail {
    position:absolute; inset:0; padding:56px 0 0;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .sidebar-rail button { width:38px; height:38px; border-radius:9px; display:grid; place-items:center; color:var(--ink-1); transition:all .15s ease; }
  .sidebar-rail button:hover { background:var(--bg-2); color:var(--ink-0); }
  .sidebar-rail svg { width:17px; height:17px; stroke-width:1.7; }
  .stepper { display:flex; align-items:center; gap:6px; padding:4px; background:var(--bg-2); border:1px solid var(--hair); border-radius:10px; margin-bottom:6px; }
  .stepper-step {
    flex:1; text-align:center; padding:6px 4px; border-radius:7px;
    font-family:var(--f-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-2); transition:all .15s ease; position:relative;
  }
  .stepper-step.active { background:var(--bg-3); color:var(--ink-0); box-shadow:var(--sh-1); }
  .stepper-step:hover { color:var(--ink-0); }
  .section { border-top:1px solid var(--hair); padding:8px 0; transition:background var(--t-fast) var(--ease-out); }
  .section:first-of-type { border-top:none; }
  .section[data-open="true"] { background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 80%); }
  .section-head {
    display:flex; align-items:center; gap:10px; width:100%; padding:10px 6px;
    cursor:pointer; border-radius:8px; transition:background var(--t-fast) var(--ease-out);
  }
  .section-head:hover { background:rgba(255,255,255,.035); }
  .section-head .label { font-family:var(--f-ui); font-size:12.5px; font-weight:500; color:var(--ink-0); letter-spacing:.005em; flex:1; text-align:left; }
  .section-head .step-num { font-family:var(--f-mono); font-size:10px; color:var(--ink-2); width:18px; letter-spacing:.04em; }
  .section-head .chev { width:14px; height:14px; color:var(--ink-2); transition:transform .2s ease; }
  .section[data-open="false"] .chev { transform:rotate(-90deg); }
  .section-summary { font-family:var(--f-mono); font-size:10px; color:var(--ink-2); margin-right:4px; }
  .section-body {
    padding:6px 4px 14px 28px; display:flex; flex-direction:column; gap:12px;
    overflow:hidden; animation:section-in .42s var(--ease-out); transform-origin:top center;
  }
  @keyframes section-in { from{transform:translateY(-4px)} to{transform:translateY(0)} }
  .section[data-open="false"] .section-body { display:none; }
  .color-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
  .color-swatch {
    width:34px; height:34px; border-radius:9px; position:relative; cursor:pointer;
    box-shadow:0 0 0 1px var(--hair-strong),0 1px 2px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.08) inset;
    flex-shrink:0; overflow:hidden;
  }
  .color-swatch::after { content:""; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(160deg,rgba(255,255,255,.18),transparent 50%); pointer-events:none; }
  .color-swatch input[type="color"] { position:absolute; inset:-4px; width:calc(100% + 8px); height:calc(100% + 8px); opacity:0; cursor:pointer; border:none; }
  .color-meta { display:flex; flex-direction:column; gap:1px; flex:1; min-width:0; }
  .color-meta .name { font-size:12px; color:var(--ink-0); font-weight:500; }
  .color-meta .hex { font-family:var(--f-mono); font-size:10.5px; color:var(--ink-2); }
  .preset-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .preset {
    aspect-ratio:1; border-radius:var(--r-md); position:relative; cursor:pointer;
    border:1.5px solid var(--hair); overflow:hidden;
    transition:transform var(--t-med) var(--ease-spring),border-color var(--t-fast) var(--ease-out),box-shadow var(--t-med) var(--ease-out);
  }
  .preset:hover { transform:translateY(-3px) scale(1.04); border-color:var(--hair-bright); box-shadow:0 12px 24px -8px rgba(0,0,0,.6); }
  .preset.active { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-glow); }
  .preset-fill { position:absolute; inset:0; }
  .preset-fill .a { position:absolute; inset:0 50% 0 0; }
  .preset-fill .b { position:absolute; inset:0 0 0 50%; }
  .preset-fill .c { position:absolute; inset:50% 0 0 0; height:30%; }
  .preset .name { position:absolute; left:5px; bottom:4px; font-family:var(--f-mono); font-size:9px; color:rgba(255,255,255,.92); text-shadow:0 1px 3px rgba(0,0,0,.7); letter-spacing:.06em; text-transform:uppercase; pointer-events:none; }
  .chips { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .chip {
    padding:10px 6px; border-radius:9px; border:1px solid var(--hair); background:var(--bg-2);
    color:var(--ink-1); font-size:11.5px; font-weight:500; transition:all .15s ease;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .chip:hover { border-color:var(--hair-bright); color:var(--ink-0); }
  .chip.active { border-color:var(--accent); background:linear-gradient(180deg,rgba(160,255,120,.06),transparent),var(--bg-3); color:var(--ink-0); box-shadow:0 0 0 1px var(--accent-glow); }
  .chip-thumb { width:100%; height:26px; border-radius:5px; background:var(--bg-3); position:relative; overflow:hidden; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field .lbl { font-family:var(--f-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-2); }
  .field-row { display:grid; grid-template-columns:1fr 80px; gap:8px; }
  .input { height:36px; padding:0 12px; background:var(--bg-2); border:1px solid var(--hair); border-radius:9px; color:var(--ink-0); font-size:13px; font-family:inherit; transition:all .15s ease; }
  .input:hover { border-color:var(--hair-bright); }
  .input:focus { border-color:var(--accent); background:var(--bg-3); box-shadow:0 0 0 3px var(--accent-glow); }
  .input.center { text-align:center; font-family:var(--f-mono); letter-spacing:.04em; }
  .fabric-list { display:flex; flex-direction:column; gap:6px; }
  .fabric { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; border:1px solid var(--hair); background:var(--bg-2); cursor:pointer; transition:all .15s ease; }
  .fabric:hover { border-color:var(--hair-bright); }
  .fabric.active { border-color:var(--accent); background:linear-gradient(180deg,rgba(160,255,120,.04),transparent),var(--bg-3); }
  .fabric-icon { width:32px; height:32px; border-radius:7px; flex-shrink:0; background:repeating-linear-gradient(45deg,rgba(255,255,255,.06) 0 2px,transparent 2px 5px),var(--bg-3); border:1px solid var(--hair-strong); }
  .fabric-meta { flex:1; min-width:0; }
  .fabric-meta .ttl { font-size:12.5px; font-weight:500; color:var(--ink-0); }
  .fabric-meta .sub { font-family:var(--f-mono); font-size:10px; color:var(--ink-2); letter-spacing:.04em; }
  .fabric-price { font-family:var(--f-mono); font-size:11px; color:var(--ink-1); }
  .fabric.active .fabric-price { color:var(--accent); }
  .typo-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .typo-chip { padding:12px 6px; border-radius:9px; border:1px solid var(--hair); background:var(--bg-2); color:var(--ink-1); text-align:center; transition:all .15s ease; cursor:pointer; }
  .typo-chip:hover { border-color:var(--hair-bright); }
  .typo-chip.active { border-color:var(--accent); background:var(--bg-3); color:var(--ink-0); box-shadow:0 0 0 1px var(--accent-glow); }
  .typo-chip .glyph { font-size:20px; line-height:1; letter-spacing:.04em; color:var(--ink-0); }
  .typo-chip .nm { font-family:var(--f-mono); font-size:9.5px; color:var(--ink-2); margin-top:6px; letter-spacing:.06em; text-transform:uppercase; }

  /* ── STAGE ── */
  .stage {
    grid-area:stage; position:relative; overflow:hidden; isolation:isolate;
    background:radial-gradient(ellipse 70% 50% at 50% 38%,rgba(255,255,255,.05),transparent 55%),radial-gradient(ellipse 90% 70% at 50% 110%,rgba(0,0,0,.55),transparent 60%),linear-gradient(180deg,#16161c 0%,#0c0c11 55%,#06060a 100%);
  }
  .stage::before,.stage::after { content:""; position:absolute; inset:0; pointer-events:none; z-index:0; }
  .stage::before {
    background:radial-gradient(ellipse 38% 32% at var(--cx) var(--cy),var(--accent-glow),transparent 65%),radial-gradient(ellipse 48% 36% at var(--cx) calc(var(--cy) + 6%),rgba(255,255,255,.08),transparent 60%);
    filter:blur(8px); transition:background var(--t-med) var(--ease-out); mix-blend-mode:screen; opacity:.95;
  }
  .stage::after {
    background:radial-gradient(circle at 30% 80%,rgba(255,255,255,.04),transparent 22%),radial-gradient(circle at 78% 22%,rgba(255,255,255,.025),transparent 14%),radial-gradient(circle at 12% 30%,rgba(255,255,255,.02),transparent 12%);
    filter:blur(.4px); opacity:.8; animation:fog-drift 32s linear infinite;
  }
  @keyframes fog-drift { 0%{transform:translate3d(0,0,0)} 50%{transform:translate3d(-12px,-8px,0)} 100%{transform:translate3d(0,0,0)} }
  .stage-floor { position:absolute; left:0; right:0; bottom:0; height:38%; pointer-events:none; z-index:0; background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.4) 60%,rgba(0,0,0,.7) 100%); }
  .stage-dust { position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.5; mix-blend-mode:screen; }
  .stage-dust span { position:absolute; width:2px; height:2px; border-radius:50%; background:rgba(255,255,255,.7); box-shadow:0 0 6px rgba(255,255,255,.5); animation:drift 14s linear infinite; opacity:0; }
  @keyframes drift { 0%{opacity:0;transform:translate3d(0,30px,0)} 15%{opacity:.7} 85%{opacity:.7} 100%{opacity:0;transform:translate3d(20px,-160px,0)} }
  .stage[data-bg="grid"] {
    background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(255,255,255,.04),transparent 60%),linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px) 0 0/36px 36px,linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px) 0 0/36px 36px,#0a0a0e;
  }
  .stage[data-bg="spot"] {
    background:radial-gradient(ellipse 30% 24% at 50% 36%,rgba(255,255,255,.18),transparent 55%),radial-gradient(ellipse 70% 50% at 50% 110%,rgba(0,0,0,.65),transparent 60%),#050507;
  }
  .stage[data-bg="mesh"] {
    background:radial-gradient(circle at 18% 25%,oklch(0.45 0.16 280/.4),transparent 45%),radial-gradient(circle at 82% 30%,oklch(0.55 0.18 30/.3),transparent 50%),radial-gradient(circle at 50% 90%,oklch(0.5 0.15 200/.35),transparent 55%),#08080c;
  }
  .corner { position:absolute; z-index:5; font-family:var(--f-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-2); pointer-events:none; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .corner.tl { top:18px; left:22px; } .corner.tr { top:18px; right:22px; }
  .corner.bl { bottom:18px; left:22px; } .corner.br { bottom:18px; right:22px; }
  .corner .dot { width:5px; height:5px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
  .corner .v { color:var(--ink-0); }
  .view-toggle {
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    display:flex; gap:4px; padding:5px;
    background:var(--bg-glass); backdrop-filter:blur(var(--blur-2)) saturate(140%); -webkit-backdrop-filter:blur(var(--blur-2)) saturate(140%);
    border:1px solid var(--hair-strong); border-radius:var(--r-pill); box-shadow:var(--sh-glass); z-index:6;
  }
  .view-toggle button { padding:7px 16px; border-radius:var(--r-pill); font-size:12px; font-weight:500; color:var(--ink-1); transition:all var(--t-med) var(--ease-out); display:inline-flex; align-items:center; gap:6px; }
  .view-toggle button:hover { color:var(--ink-0); }

/* ────────────────────────────────────────────────────
   UNDO/REDO REDUCER
──────────────────────────────────────────────────── */
function designReducer(state, action) {
  switch (action.type) {
    case "SET": {
      const next = { ...state.present, ...action.payload };
      return { past:[...state.past, state.present].slice(-30), present:next, future:[] };
    }
    case "SET_COLOR": {
      const next = { ...state.present, colors:{ ...state.present.colors, [action.zone]:action.color } };
      return { past:[...state.past, state.present].slice(-30), present:next, future:[] };
    }
    case "APPLY_PRESET": {
      const p = action.preset;
      const next = { ...state.present, colors:{ body:p.body, sleeves:p.sleeves, collar:p.collar, shorts:p.shorts } };
      return { past:[...state.past, state.present].slice(-30), present:next, future:[] };
    }
    case "UNDO": {
      if (!state.past.length) return state;
      const prev = state.past[state.past.length-1];
      return { past:state.past.slice(0,-1), present:prev, future:[state.present,...state.future] };
    }
    case "REDO": {
      if (!state.future.length) return state;
      const next = state.future[0];
      return { past:[...state.past, state.present], present:next, future:state.future.slice(1) };
    }
    case "REPLACE":
      return { past:[...state.past, state.present].slice(-30), present:action.design, future:[] };
    default: return state;
  }
}

/* ────────────────────────────────────────────────────
   STYLE PREVIEW (miniatura en selector de estilo)
──────────────────────────────────────────────────── */
function StylePreview({ style, body }) {
  if (style==="classic")      return <div style={{position:"absolute",inset:0,background:body}}/>;
  if (style==="stripes-v")    return <div style={{position:"absolute",inset:0,background:`repeating-linear-gradient(90deg,${body} 0 4px,rgba(255,255,255,.18) 4px 8px)`}}/>;
  if (style==="stripes-h")    return <div style={{position:"absolute",inset:0,background:`repeating-linear-gradient(0deg,${body} 0 4px,rgba(255,255,255,.18) 4px 8px)`}}/>;
  if (style==="stripes-thin") return <div style={{position:"absolute",inset:0,background:`repeating-linear-gradient(90deg,${body} 0 6px,rgba(255,255,255,.22) 6px 8px)`}}/>;
  if (style==="sash")         return <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,${body} 0 42%,rgba(255,255,255,.22) 42% 58%,${body} 58% 100%)`}}/>;
  if (style==="gradient")     return <div style={{position:"absolute",inset:0,background:`linear-gradient(180deg,${body},rgba(0,0,0,.28))`}}/>;
  return null;
}

/* ────────────────────────────────────────────────────
   CTA CARD (precio / talle / cantidad)
──────────────────────────────────────────────────── */
function useAnimatedNumber(target, duration=460) {
  const [v, setV] = useState(target);
  const fromRef = useRef(target);
  useEffect(()=>{
    const from = fromRef.current;
    const start = performance.now();
    let raf;
    const tick = (now)=>{
      const t = Math.min(1,(now-start)/duration);
      const eased = 1-Math.pow(1-t,3);
      setV(Math.round(from+(target-from)*eased));
      if (t<1) raf=requestAnimationFrame(tick);
      else fromRef.current=target;
    };
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[target,duration]);
  return v;
}

function CTACard({ design, dispatch }) {
  const fabricUp = {drypique:0,mesh:1500,sublim:3200,premium:5800}[design.fabric]||0;
  const total = (24990+fabricUp)*design.qty;
  const animated = useAnimatedNumber(total);
  const parts = animated.toLocaleString("es-AR").split(",");
  return (
    <div className="cta-card">
      <div className="row">
        <div>
          <div className="label">Tu diseño · {design.qty} unidad{design.qty>1?"es":""}</div>
          <div className="price">$<span className="num">{parts[0]}</span>{parts[1]&&<span className="cents">,{parts[1]}</span>}</div>
        </div>
      </div>
      <div className="size-row">

        <div className="size-segs">
          {SIZES.map(s=>(
            <button key={s} className={"size-seg "+(design.size===s?"active":"")}

        <div className="qty-stepper">
          <button onClick={()=>dispatch({type:"SET",payload:{qty:Math.max(1,design.qty-1)}})}><Icon.Minus/></button>
          <span className="v">{design.qty}</span>
          <button onClick={()=>dispatch({type:"SET",payload:{qty:Math.min(99,design.qty+1)}})}><Icon.Plus/></button>
        </div>
        <button className="size-pill">
          <span>{FABRICS.find(f=>f.id===design.fabric)?.name}</span>

function TopBar({ projectName, setProjectName, canUndo, canRedo, onUndo, onRedo, onDownload }) {
  return (
    <header className="topbar">
      <div className="brand">
        <div className="brand-mark">F</div>
        <div style={{display:"flex",flexDirection:"column",lineHeight:1}}>
          <span className="brand-name">FORMA</span>
        </div>
        <span className="brand-tag">Studio · v2</span>
      </div>
      <div className="project-meta">
        <Icon.Sparkle/>
        <input className="project-name" value={projectName} onChange={e=>setProjectName(e.target.value)}/>
        <span className="project-sep">·</span>
        <span className="project-status">En vivo</span>
      </div>
      <div className="top-spacer"/>
      <div className="top-actions">
        <button className="ico-btn" title="Deshacer (⌘Z)" disabled={!canUndo} onClick={onUndo}><Icon.Undo/></button>
        <button className="ico-btn" title="Rehacer (⇧⌘Z)" disabled={!canRedo} onClick={onRedo}><Icon.Redo/></button>
        <div className="top-divider"/>
        <button className="ico-btn ico-search" title="Buscar"><Icon.Search/></button>
        <button className="ico-btn ico-bell"   title="Notificaciones"><Icon.Bell/></button>
        <div className="top-divider"/>
        <button className="btn-ghost"><Icon.Save/><span className="btn-ghost-label">Guardar</span></button>
        <button className="btn-ghost"><Icon.Share/><span className="btn-ghost-label">Compartir</span></button>
        <button className="btn-primary" onClick={onDownload}><Icon.Download/><span className="btn-primary-label">Descargar</span></button>
        <div className="top-divider"/>
        <div className="avatar">JD</div>
      </div>
    </header>
  );
}

/* ────────────────────────────────────────────────────
   STAGE
──────────────────────────────────────────────────── */
// Dust particles — memoized so positions don't change on re-render
const DUST = Array.from({length:18},()=>({
  left:(Math.random()*100).toFixed(1)+"%",
  bottom:(Math.random()*60).toFixed(1)+"%",
  delay:(Math.random()*14).toFixed(1)+"s",
  dur:(10+Math.random()*12).toFixed(1)+"s",
}));

function Stage({ design, dispatch, view, setView, zoom, setZoom, bg, favorites, setFavorites, jerseyFontStack, svgDownloadRef }) {
  const colors = design.colors;
  const stageRef = useRef(null);
  const [animKey, setAnimKey] = useState(0);
  const prevView = useRef(view);

  // cursor-reactive lighting
  useEffect(()=>{
    const el = stageRef.current;
    if (!el) return;
    let raf=0;
    let tx=50, ty=45;
    const onMove=(e)=>{
      const r = el.getBoundingClientRect();
      tx = ((e.clientX-r.left)/r.width)*100;
      ty = ((e.clientY-r.top)/r.height)*100;
      if (!raf) raf=requestAnimationFrame(apply);
    };
    const onLeave=()=>{ tx=50; ty=45; if (!raf) raf=requestAnimationFrame(apply); };
    const apply=()=>{ raf=0; el.style.setProperty("--cx",tx.toFixed(1)+"%"); el.style.setProperty("--cy",ty.toFixed(1)+"%"); };
    el.addEventListener("mousemove",onMove);
    el.addEventListener("mouseleave",onLeave);
    return ()=>{ el.removeEventListener("mousemove",onMove); el.removeEventListener("mouseleave",onLeave); if (raf) cancelAnimationFrame(raf); };
  },[]);

  useEffect(()=>{
    if (prevView.current!==view) { setAnimKey(k=>k+1); prevView.current=view; }
  },[view]);

  const isCurrentFav = favorites.some(f=>JSON.stringify(f.design)===JSON.stringify(design));

  const jerseyProps = { colors, style:design.style, name:design.name, number:design.number, textColor:design.textColor, jerseyFont:jerseyFontStack };

  return (
    <div className="stage" data-bg={bg} ref={(node)=>{ stageRef.current=node; if(svgDownloadRef) svgDownloadRef.current=node; }}>
      <div className="stage-floor"/>
      <div className="stage-dust">
        {DUST.map((d,i)=>(
          <span key={i} style={{left:d.left,bottom:d.bottom,animationDelay:d.delay,animationDuration:d.dur}}/>
        ))}
      </div>

      {/* Corner readouts */}
      <div className="corner tl"><span className="dot"/><span>Live</span></div>
      <div className="corner tr"><span className="v">2K</span><span>· PBR</span></div>

      {/* Badges */}
      <div className="badges">
        <span className="badge"><span className="b-dot"/>Made-to-order</span>
        <span className="badge">{FABRICS.find(f=>f.id===design.fabric)?.name}</span>
        <span className="badge">7–10 días</span>
      </div>

      {/* View toggle */}
      <div className="view-toggle">
        <button className={view==="front"?"active":""} onClick={()=>setView("front")}><Icon.Front/>Frente</button>
        <button className={view==="back" ?"active":""} onClick={()=>setView("back")} ><Icon.Back/> Dorso</button>
        <button className={view==="both" ?"active":""} onClick={()=>setView("both")} ><Icon.Both/> Comparar</button>
      </div>

      {/* Canvas */}
      <div className="canvas-wrap">
        <div className="canvas-shelf">
          {view==="both" ? (
            <>
              <div key={"cf"+animKey} className="canvas-cell compare anim-enter" style={{"--zoom":zoom/100}}>
                <div className="flip-wrap"><Jersey view="front" idPrefix="cmp-f" {...jerseyProps}/></div>
                <div className="jersey-cap"><span className="hair"/>Frente<span className="hair"/></div>
              </div>
              <div key={"cb"+animKey} className="canvas-cell compare anim-enter" style={{"--zoom":zoom/100,animationDelay:"80ms"}}>
                <div className="flip-wrap"><Jersey view="back" idPrefix="cmp-b" {...jerseyProps}/></div>
                <div className="jersey-cap"><span className="hair"/>Dorso<span className="hair"/></div>
              </div>
            </>
          ) : (
            <div key={"v"+view+animKey} className="canvas-cell anim-enter" style={{"--zoom":zoom/100}}>
              <div className="flip-wrap">
                <Jersey view={view} idPrefix={"j-"+(view==="back"?"b":"f")} {...jerseyProps} data-download-target="true"/>
              </div>
              <div className="jersey-cap">
                <span className="hair"/>{view==="back"?"Vista dorso":"Vista frente"} · 1:1<span className="hair"/>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Favorites strip */}
      <div className="favorites">
        {favorites.map((f,i)=>(
          <div key={i} className={"fav-card "+(JSON.stringify(f.design)===JSON.stringify(design)?"active":"")}
               onClick={()=>dispatch({type:"REPLACE",design:f.design})} title={f.name}>
            <div className="fav-mini" style={{background:`linear-gradient(180deg,${f.design.colors.body} 0 60%,${f.design.colors.shorts} 60% 100%)`}}>
              <div style={{position:"absolute",left:4,right:4,top:"58%",height:3,background:f.design.colors.sleeves,borderRadius:1}}/>
              <div style={{position:"absolute",top:22,left:"50%",transform:"translateX(-50%)",fontFamily:'"Bebas Neue",sans-serif',fontSize:13,color:f.design.textColor,lineHeight:1}}>{f.design.number}</div>
            </div>
          </div>
        ))}
        <button className="fav-add" title={isCurrentFav?"Ya guardado":"Guardar diseño"}
                onClick={()=>{ if (!isCurrentFav) setFavorites([...favorites,{name:`${design.name} ${design.number}`,design}].slice(-6)); }}>
          {isCurrentFav?<Icon.HeartFill/>:<Icon.Plus/>}
        </button>
      </div>

      {/* Floating toolbar */}
      <div className="floating-toolbar">
        <button className="tool" title="Zoom out" onClick={()=>setZoom(Math.max(40,zoom-10))}><Icon.Minus/></button>
        <span className="zoom num">{zoom}%</span>
        <button className="tool" title="Zoom in"  onClick={()=>setZoom(Math.min(200,zoom+10))}><Icon.Plus/></button>
        <div className="ft-sep"/>
        <button className="tool" title="100%" onClick={()=>setZoom(100)}><Icon.Eye/></button>
        <button className="tool" title="Pantalla completa" onClick={()=>document.documentElement.requestFullscreen?.()}><Icon.Maximize/></button>
      </div>

      {/* Hotkeys hint */}
      <div className="hotkeys">
        <span className="k"><span className="kbd">F</span>Frente</span>
        <span className="k"><span className="kbd">B</span>Dorso</span>
        <span className="k"><span className="kbd">C</span>Comparar</span>
        <span className="k"><span className="kbd">⌘Z</span>Deshacer</span>
      </div>

      <CTACard design={design} dispatch={dispatch}/>
    </div>
  );
}

/* ────────────────────────────────────────────────────
   DOWNLOAD — serializa el SVG de la camiseta a PNG
──────────────────────────────────────────────────── */
function downloadJersey(view, design, jerseyFontStack) {
  // Encuentra el SVG del jersey activo
  const selector = view === "back" ? '[id^="j-b-shadow"]' : '[id^="j-f-shadow"]';
  let svg = document.querySelector(selector)?.closest("svg");
  if (!svg) svg = document.querySelector(".canvas-cell:not(.compare) .jersey-stage svg");
  if (!svg) { alert("No se encontró la camiseta para exportar."); return; }

  const W=400, H=480;
  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  clone.setAttribute("width", W);
  clone.setAttribute("height", H);

  const canvas = document.createElement("canvas");
  canvas.width = W*2; canvas.height = H*2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2,2);

  const svgStr = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([svgStr],{type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const img = new Image();

  img.onload = ()=>{
    ctx.drawImage(img,0,0,W,H);
    URL.revokeObjectURL(url);
    const a = document.createElement("a");
    a.download = `camiseta-${view === "back" ? "dorso" : "frente"}.png`;
    a.href = canvas.toDataURL("image/png");
    a.click();
  };
  img.onerror = ()=>{
    // Fallback: descargar como SVG
    const a = document.createElement("a");
    a.download = `camiseta-${view === "back" ? "dorso" : "frente"}.svg`;
    a.href = url;
    a.click();
  };
  img.src = url;
}

/* ────────────────────────────────────────────────────
   APP ROOT
──────────────────────────────────────────────────── */
function App() {
  const [state, dispatch] = useReducer(designReducer, {past:[],present:INITIAL_DESIGN,future:[]});
  const design = state.present;

  const [projectName, setProjectName] = useState("Talleres Sub-15 · Edición 2026");
  const [view, setView]     = useState("front");
  const [zoom, setZoom]     = useState(100);
  const [collapsed, setCollapsed] = useState(false);
  const [activeStep, setActiveStep] = useState(0);
  const [bg] = useState("studio");
  const [openSections, setOpenSections] = useState({
    presets:true, colors:true, style:true, text:true, fabric:false, advanced:false
  });
  const [favorites, setFavorites] = useState(()=>{
    try { return JSON.parse(localStorage.getItem("forma:favs")||"null")||DEFAULT_FAVS; }
    catch { return DEFAULT_FAVS; }
  });

  useEffect(()=>{ localStorage.setItem("forma:favs",JSON.stringify(favorites)); },[favorites]);

  // Keyboard shortcuts
  useEffect(()=>{
    const onKey=(e)=>{
      if (e.target&&(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")) return;
      const mod = e.metaKey||e.ctrlKey;
      if (mod&&e.key.toLowerCase()==="z"&&!e.shiftKey) { e.preventDefault(); dispatch({type:"UNDO"}); return; }
      if (mod&&(e.key.toLowerCase()==="y"||(e.shiftKey&&e.key.toLowerCase()==="z"))) { e.preventDefault(); dispatch({type:"REDO"}); return; }
      if (e.key.toLowerCase()==="f") setView("front");
      else if (e.key.toLowerCase()==="b") setView("back");
      else if (e.key.toLowerCase()==="c") setView("both");
    };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[]);

  const toggleSection = key => setOpenSections(o=>({...o,[key]:!o[key]}));
  const jerseyFontStack = JERSEY_FONTS.find(f=>f.id===design.jerseyFont)?.stack||JERSEY_FONTS[0].stack;
  const svgDownloadRef = useRef(null);

  const handleDownload = ()=>downloadJersey(view, design, jerseyFontStack);

  return (
    <div className="app" data-sidebar-collapsed={collapsed}>
      <TopBar
        projectName={projectName} setProjectName={setProjectName}
        canUndo={state.past.length>0} canRedo={state.future.length>0}
        onUndo={()=>dispatch({type:"UNDO"})} onRedo={()=>dispatch({type:"REDO"})}
        onDownload={handleDownload}
      />
      <aside className="sidebar">
        <button className="sidebar-collapse" title={collapsed?"Expandir":"Colapsar"} onClick={()=>setCollapsed(c=>!c)}>
          {collapsed?<Icon.ChevronRight/>:<Icon.ChevronLeft/>}
        </button>
        <Sidebar design={design} dispatch={dispatch}
                 activeStep={activeStep} setActiveStep={setActiveStep}
                 openSections={openSections} toggleSection={toggleSection}/>
        <div className="sidebar-rail">
          <button title="Presets"><Icon.Wand/></button>
          <button title="Colores"><Icon.Palette/></button>
          <button title="Estilo"><Icon.Zap/></button>
          <button title="Texto"><Icon.Text/></button>
          <button title="Tela"><Icon.Fabric/></button>
          <button title="Avanzado"><Icon.Sparkle/></button>
        </div>
      </aside>
      <Stage
        design={design} dispatch={dispatch}
        view={view} setView={setView}
        zoom={zoom} setZoom={setZoom}
        bg={bg}
        jerseyFontStack={jerseyFontStack}
        favorites={favorites} setFavorites={setFavorites}
        svgDownloadRef={svgDownloadRef}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
